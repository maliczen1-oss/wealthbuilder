<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
WealthBuilder OS | Mission Control
</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<div id="app">

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="topbar">

        <div class="logo-area">

            <h1>

                WealthBuilder OS

            </h1>

            <span>

                Powered by Jarvis Intelligence

            </span>

        </div>

        <div class="status-area">

            <div class="status-pill">

                <span class="dot online"></span>

                Connected

            </div>

            <div id="brokerName"
            class="status-pill">

                Broker

            </div>

            <div id="serverTime"
            class="status-pill">

                --:--

            </div>

        </div>

    </header>

    <!-- ===========================
         MAIN LAYOUT
    ============================ -->

    <div class="layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <nav>

                <button class="nav-item active">

                    Mission Control

                </button>

                <button class="nav-item">

                    Trading

                </button>

                <button class="nav-item">

                    Automation

                </button>

                <button class="nav-item">

                    Journal

                </button>

                <button class="nav-item">

                    DNA

                </button>

                <button class="nav-item">

                    Psychology

                </button>

                <button class="nav-item">

                    Academy

                </button>

                <button class="nav-item">

                    Analytics

                </button>

                <button class="nav-item">

                    Settings

                </button>

            </nav>

        </aside>

        <!-- MAIN -->

        <main class="dashboard">

            <!-- JARVIS -->

            <section
            class="card hero-card">

                <div>

                    <h2>

                        Good Morning, Founder.

                    </h2>

                    <p>

                        Welcome to Mission Control.

                    </p>

                </div>

                <div
                id="morningBrief">

                    Loading Morning Brief...

                </div>

            </section>

            <!-- SCORE ROW -->

            <section
            class="grid two">

                <div class="card">

                    <h3>

                        WealthBuilder Score

                    </h3>

                    <div
                    id="wealthScore"
                    class="big-number">

                        --

                    </div>

                    <p>

                        Discipline over emotion.

                    </p>

                </div>

                <div class="card">

                    <h3>

                        Readiness

                    </h3>

                    <div
                    id="readinessScore"
                    class="big-number">

                        --

                    </div>

                    <p
                    id="readinessStatus">

                        Loading...

                    </p>

                </div>

            </section>

            <!-- ACCOUNT -->

            <section
            class="grid two">

                <div class="card">

                    <h3>

                        Account Health

                    </h3>

                    <div id="accountHealth">

                        Loading...

                    </div>

                </div>

                <div class="card">

                    <h3>

                        Automation

                    </h3>

                    <div id="automationStatus">

                        Loading...

                    </div>

                </div>

            </section>
