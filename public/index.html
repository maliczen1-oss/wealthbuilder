<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WealthBuilder</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.value{
font-size:28px;
margin-top:10px;
font-weight:bold;
color:#4ade80;
}

small{
color:#94a3b8;
}
</style>

</head>

<body>

<h1>WealthBuilder Dashboard</h1>

<div class="grid">

<div class="card">
<small>Status</small>
<div class="value" id="status">Loading...</div>
</div>

<div class="card">
<small>Account Name</small>
<div class="value" id="name">-</div>
</div>

<div class="card">
<small>Broker</small>
<div class="value" id="broker">-</div>
</div>

<div class="card">
<small>Balance</small>
<div class="value" id="balance">-</div>
</div>

<div class="card">
<small>Equity</small>
<div class="value" id="equity">-</div>
</div>

<div class="card">
<small>Free Margin</small>
<div class="value" id="margin">-</div>
</div>

<div class="card">
<small>Open Positions</small>
<div class="value" id="positions">0</div>
</div>

</div>

<script>

async function load(){

const health=await fetch("/api/health").then(r=>r.json());

const account=await fetch("/api/account").then(r=>r.json());

const positions=await fetch("/api/positions").then(r=>r.json());

document.getElementById("status").innerHTML="🟢 Online";

document.getElementById("name").innerHTML=account.name;

document.getElementById("broker").innerHTML=account.broker;

document.getElementById("balance").innerHTML=account.balance;

document.getElementById("equity").innerHTML=account.equity;

document.getElementById("margin").innerHTML=account.freeMargin;

document.getElementById("positions").innerHTML=positions.length;

}

load();

setInterval(load,5000);

</script>

</body>
</html>
